                alignItems: 'center',
                justifyContent: 'center',
                zIndex: 1000
              }}>
              <div 
                onClick={(e) => e.stopPropagation()}
                style={{
                  background: 'var(--color-surface)',
                  borderRadius: '8px',
                  padding: 'var(--spacing-xl)',
                  maxWidth: '500px',
                  width: '90%',
                  maxHeight: '80vh',
                  overflow: 'auto',
                  border: '1px solid var(--color-border)'
                }}>
                <h3 style={{ marginBottom: 'var(--spacing-lg)', color: 'var(--color-text-primary)', fontSize: '18px', fontWeight: 600 }}>Gérer les catégories</h3>

                {/* Ajouter nouvelle catégorie */}
                <div style={{ marginBottom: 'var(--spacing-lg)', padding: 'var(--spacing-md)', background: 'var(--color-bg)',
                      color: 'var(--color-text-primary)', borderRadius: '6px', border: '1px solid var(--color-border)' }}>
                  <h4 style={{ marginBottom: 'var(--spacing-sm)', color: 'var(--color-text-secondary)', fontSize: '14px', fontWeight: 500 }}>Ajouter une catégorie</h4>
                  <div style={{ display: 'flex', gap: 'var(--spacing-xs)' }}>
                    <input
                      type="text"
                      placeholder="Nom de la catégorie"
                      value={newCategory}
                      onChange={(e) => setNewCategory(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && handleAddCategory()}
                      style={{
                        flex: 1,
                        padding: '0.5rem 0.75rem',
                        border: '1px solid var(--color-border)',
                        borderRadius: '4px',
                        fontSize: '14px',
                        fontFamily: 'inherit'
                      }}
                    />
                    <button
                      onClick={handleAddCategory}
                      style={{
                        background: 'var(--color-button-primary)',
                        color: 'white',
                        border: 'none',
                        padding: '0.5rem 1rem',
                        borderRadius: '4px',
                        cursor: 'pointer',
                        fontWeight: 500,
                        fontSize: '14px',
                        fontFamily: 'inherit'
                      }}
                    >
                      Ajouter
                    </button>
                  </div>
                </div>

                {/* Liste des catégories avec drag & drop */}
                <div style={{ marginBottom: 'var(--spacing-md)' }}>
                  <h4 style={{ marginBottom: 'var(--spacing-sm)', color: 'var(--color-text-secondary)', fontSize: '14px', fontWeight: 500 }}>Catégories existantes</h4>
                  {(specCategories || []).map((cat, index) => {
                    const specsCount = (plainte.specialites || []).filter(s => (s.category || 'Général') === cat).length;
                    
                    return editingCategory === cat ? (
                      <div key={cat} style={{ display: 'flex', gap: 'var(--spacing-xs)', marginBottom: 'var(--spacing-xs)' }}>
                        <input
                          type="text"
                          value={editCategoryName}
                          onChange={(e) => setEditCategoryName(e.target.value)}
                          onKeyPress={(e) => e.key === 'Enter' && handleEditCategory(cat, editCategoryName)}
                          style={{
                            flex: 1,
                            padding: '0.5rem 0.75rem',
                            border: '1px solid var(--color-border)',
                            borderRadius: '4px',
                            fontSize: '14px',
                            fontFamily: 'inherit'
                          }}
                          autoFocus
                        />
                        <button
                          onClick={() => handleEditCategory(cat, editCategoryName)}
                          style={{
                            background: 'var(--color-button-primary)',
                            color: 'white',
                            border: 'none',
                            padding: '0.5rem 1rem',
                            borderRadius: '4px',
                            cursor: 'pointer',
                            fontSize: '14px',
                            fontFamily: 'inherit'
                          }}
                        >
                          ✓
                        </button>
                        <button
                          onClick={() => {
                            setEditingCategory(null);
                            setEditCategoryName('');
                          }}
                          style={{
                            background: 'var(--color-bg)',
                      color: 'var(--color-text-primary)',
                            color: 'var(--color-text-secondary)',
                            border: '1px solid var(--color-border)',
                            padding: '0.5rem 1rem',
                            borderRadius: '4px',
                            cursor: 'pointer',
                            fontSize: '14px',
                            fontFamily: 'inherit'
                          }}
                        >
                          ✕
                        </button>
                      </div>
                    ) : (
                      <SpecCategoryItem
                        key={cat}
                        cat={cat}
                        index={index}
                        specsCount={specsCount}
                        isEditing={editingCategory === cat}
                        onEdit={() => {
                          setEditingCategory(cat);
                          setEditCategoryName(cat);
                        }}
                        onDelete={() => handleDeleteCategory(cat)}
                        onDragStart={(e) => {
                          e.dataTransfer.effectAllowed = 'move';
                          e.dataTransfer.setData('text/plain', index.toString());
                          e.currentTarget.style.opacity = '0.5';
                        }}
                        onDrop={(e) => {
                          e.preventDefault();
                          e.currentTarget.style.borderStyle = 'solid';
                          const draggedIndex = parseInt(e.dataTransfer.getData('text/plain'));
                          if (draggedIndex !== index) {
                            const newCategories = [...specCategories];
                            const [removed] = newCategories.splice(draggedIndex, 1);
                            newCategories.splice(index, 0, removed);
                            setSpecCategories(newCategories);
                          }
                        }}
                      />
                    );
                  })}
                </div>

                <button
                  onClick={() => setShowCategoryManager(false)}
                  style={{
                    width: '100%',
                    background: 'var(--color-bg)',
                      color: 'var(--color-text-primary)',
                    color: 'var(--color-text-secondary)',
                    border: '1px solid var(--color-border)',
                    padding: '0.5rem',
                    borderRadius: '4px',
                    cursor: 'pointer',
                    fontWeight: 500,
                    fontSize: '14px',
                    fontFamily: 'inherit'
                  }}
                >
                  Fermer
                </button>
              </div>
            </div>
          )}
        </div>
      );

    // Composant DocumentCard avec drag & drop
    function DocumentCard({ doc, category, categoryColor, onEdit, onDelete, onMove, openDocument, isGuest = false }) {
      const [isDragging, setIsDragging] = React.useState(false);
      const [isDragOver, setIsDragOver] = React.useState(false);
      const [isHovered, setIsHovered] = React.useState(false);
      
      const handleDragStart = (e) => {
        e.stopPropagation();
        setIsDragging(true);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('documentId', String(doc.id));
        e.dataTransfer.setData('documentCategory', category);
        // Ajouter un effet visuel
        e.currentTarget.style.opacity = '0.5';
      };
      
      const handleDragOver = (e) => {
        e.preventDefault();
        e.stopPropagation();
        // Ne pas utiliser getData() ici car ça ne marche pas pendant le drag
        // On accepte juste tous les drags
        setIsDragOver(true);
        e.dataTransfer.dropEffect = 'move';
      };
      
      const handleDragLeave = (e) => {
        e.stopPropagation();
        // Vérifier qu'on quitte vraiment l'élément (pas un enfant)
        if (!e.currentTarget.contains(e.relatedTarget)) {
          setIsDragOver(false);
        }
      };
      
      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const draggedId = e.dataTransfer.getData('documentId');
        const draggedCategory = e.dataTransfer.getData('documentCategory');
        
        // Comparer en string pour être sûr
        if (draggedId && String(draggedId) !== String(doc.id)) {
          // Appeler onMove avec les IDs et les catégories
          onMove(draggedId, doc.id, draggedCategory, category);
          // Marquer l'événement comme géré
          e.dataTransfer.setData('handled', 'true');
        }
        setIsDragOver(false);
      };
      
      const handleDragEnd = (e) => {
        e.stopPropagation();
        e.currentTarget.style.opacity = '1';
        setIsDragging(false);
        setIsDragOver(false);
      };
      
      return (
        <div
          draggable
          onDragStart={handleDragStart}
          onDragOver={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={isGuest ? undefined : handleDrop}
          onDragEnd={isGuest ? undefined : handleDragEnd}
          style={{
            background: 'var(--color-border)',
            border: isDragOver ? `1px dashed ${categoryColor}` : '1px solid var(--color-border-hover)',
            transition: 'all 0.15s',
            display: 'flex',
            flexDirection: 'row',
            cursor: isGuest ? 'default' : (isDragging ? 'grabbing' : 'grab'),
            opacity: isDragging ? 0.5 : 1,
            pointerEvents: 'auto'
          }}
          onMouseEnter={e => { e.currentTarget.style.background = 'var(--color-border-hover)'; e.currentTarget.style.borderColor = categoryColor || 'var(--color-accent)'; setIsHovered(true); }}
          onMouseLeave={e => { e.currentTarget.style.background = 'var(--color-border)'; e.currentTarget.style.borderColor = 'var(--color-border-hover)'; setIsHovered(false); }}
        >
          {/* Barre de couleur gauche */}
          <div style={{ width: '3px', background: category === 'Important' ? categoryColor : 'var(--color-border)', flexShrink: 0 }} />

          {/* CONTENU CLIQUABLE */}
          <div
            onClick={() => openDocument(doc)}
            style={{
              padding: '0.65rem 0.75rem',
              cursor: 'pointer',
              flex: 1,
              display: 'flex',
              flexDirection: 'column',
              gap: '0.25rem'
            }}
          >
            {/* Layout principal: icône + titre */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              {/* Icône simple */}
              <div style={{
                width: '18px',
                height: '18px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                flexShrink: 0,
                color: 'var(--color-text-muted)'
              }}>
                {doc.data && (doc.data.includes('youtube.com') || doc.data.includes('youtu.be') || doc.data.includes('vimeo.com'))
                ? (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>)
                : (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>)
              }
              </div>
              
              {/* Titre */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 'clamp(0.7rem, 0.85rem, 1rem)',
                  fontWeight: 600,
                  color: 'var(--color-text-primary)',
                  wordBreak: 'break-word',
                  lineHeight: '1.2',
                  display: '-webkit-box',
                  WebkitLineClamp: 3,
                  WebkitBoxOrient: 'vertical',
                  overflow: 'hidden'
                }}>
                  {doc.nom}
                </div>
              </div>
              
              {/* Boutons invisibles par défaut */}
              {!isGuest && <div style={{ display: 'flex', gap: '0.2rem', opacity: isHovered ? 1 : 0, transition: 'opacity 0.2s', flexShrink: 0 }}>
                <button
                  onClick={(e) => { e.stopPropagation(); onEdit(doc); }}
                  style={{ background: 'var(--color-border)', border: '1px solid var(--color-border-hover)', width: '20px', height: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: '10px', padding: 0, color: 'var(--color-text-secondary)' }}
                  onMouseEnter={e => { e.currentTarget.style.background = categoryColor || '#3B82F6'; e.currentTarget.style.color = 'white'; e.currentTarget.style.borderColor = categoryColor || '#3B82F6'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'var(--color-border)'; e.currentTarget.style.color = 'var(--color-text-secondary)'; e.currentTarget.style.borderColor = 'var(--color-border-hover)'; }}
                  title="Modifier"
                >✎</button>
                <button
                  onClick={(e) => { e.stopPropagation(); onDelete(doc.id); }}
                  style={{ background: 'var(--color-border)', border: '1px solid var(--color-border-hover)', width: '20px', height: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: '12px', padding: 0, color: '#EF4444' }}
                  onMouseEnter={e => { e.currentTarget.style.background = '#EF4444'; e.currentTarget.style.color = 'white'; e.currentTarget.style.borderColor = '#EF4444'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'var(--color-border)'; e.currentTarget.style.borderColor = 'var(--color-border-hover)'; }}
                  title="Supprimer"
                >×</button>
              </div>}
            </div>
          </div>
        </div>
      );
    }

    function DocumentsTab({ plainte, categoryColor, onAddDocument, onDeleteDocument, onEditDocument, onRenameCategoryInDocuments, onMoveDocument, onReorderDocuments, isGuest = false }) {
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingDoc, setEditingDoc] = useState(null);
      const [editName, setEditName] = useState('');
      const [editUrl, setEditUrl] = useState('');
      const [editCategory, setEditCategory] = useState('');
      const [linkName, setLinkName] = useState('');
      const [linkUrl, setLinkUrl] = useState('');
      const [linkCategory, setLinkCategory] = useState('');
      const [showCategoryManager, setShowCategoryManager] = useState(false);
      const [docCategories, setDocCategories] = useState(() => {
        // D'abord essayer de charger depuis l'objet plainte
        if (plainte.docCategories && plainte.docCategories.length > 0) {
          return plainte.docCategories;
        }
        // Sinon essayer localStorage
        const saved = localStorage.getItem('docCategories_' + plainte.id);
        return saved ? JSON.parse(saved) : ['Important'];

          return;

          nom: linkName,
          data: linkUrl,
          category: linkCategory || docCategories[0] || 'Important'

        setShowAddModal(false);

        if (draggedCategory === targetCategory && onReorderDocuments) {

      };

          alert('Cette catégorie existe déjà');
          return;
        }
        // Mettre à jour la liste des catégories
        setDocCategories(docCategories.map(cat => cat === oldName ? newName : cat));
        // Mettre à jour tous les documents qui ont cette catégorie

          setIsDragOver(true);
        }
      };
      
      const handleDragLeave = (e) => {
        e.stopPropagation();
        setIsDragOver(false);
      };

  const levenshteinDistance = (str1, str2) => {
    const matrix = [];

    for (let i = 1; i <= str2.length; i++) {
      for (let j = 1; j <= str1.length; j++) {
        matrix[i][j] = str2.charAt(i - 1) === str1.charAt(j - 1) ? matrix[i - 1][j - 1] : Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
      }
    }
    return matrix[str2.length][str1.length];
  };

                Réinitialiser
              </button>
              <button onClick={() => { if (confirm('Voulez-vous vous déconnecter ?')) { firebase.auth().signOut(); } }} style={{ flex: 1, padding: '0.5rem', fontSize: '12px', fontWeight: 500, background: 'transparent', color: 'var(--color-text-secondary)', border: '1px solid var(--color-border)', borderRadius: '6px', cursor: 'pointer', fontFamily: 'inherit' }}>
                Déconnexion
              </button>
            </div>


          </div>
        </div>
      )}
      
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
